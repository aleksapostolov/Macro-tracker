<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacroTracker PWA</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen pb-12 font-sans" x-data="macroApp()" x-init="initApp()">

  <!-- Top Header Nav -->
  <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-30 px-4 py-3 shadow-md">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <h1 class="font-bold text-lg text-emerald-400 flex items-center gap-2">
        <span>🥗</span> MacroTracker
      </h1>
      <div class="flex items-center gap-2">
        <button @click="showJsonDrawer = true" class="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-1.5 rounded-lg border border-slate-600 font-medium transition">
          📥 Import/Export JSON
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 mt-4 space-y-6">

    <!-- Primary Tab View Toggle -->
    <div class="grid grid-cols-2 bg-slate-800 p-1 rounded-xl border border-slate-700 text-sm font-semibold">
      <button @click="activeTab = 'daily'" :class="activeTab === 'daily' ? 'bg-emerald-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg transition">
        Daily Log
      </button>
      <button @click="activeTab = 'weekly'" :class="activeTab === 'weekly' ? 'bg-emerald-600 text-white shadow' : 'text-slate-400 hover:text-slate-200'" class="py-2 rounded-lg transition">
        Weekly Analytics
      </button>
    </div>

    <!-- DAILY LOG TAB -->
    <div x-show="activeTab === 'daily'" class="space-y-6">

      <!-- Summary & Chart Header -->
      <section class="bg-slate-800 rounded-2xl p-4 border border-slate-700 shadow-sm space-y-4">
        <div class="flex items-center justify-between">
          <div>
            <h2 class="text-sm text-slate-400 font-medium">Daily Target vs Intake</h2>
            <p class="text-2xl font-black text-slate-100" x-text="`${totals.calories} / ${targets.calories} kcal`"></p>
          </div>
          <!-- Chart View Toggle -->
          <div class="flex bg-slate-900 p-1 rounded-lg border border-slate-700 text-xs font-semibold">
            <button @click="chartType = 'bars'; renderChart()" :class="chartType === 'bars' ? 'bg-slate-700 text-emerald-400' : 'text-slate-400'" class="px-2.5 py-1 rounded transition">
              Vertical Bars
            </button>
            <button @click="chartType = 'pie'; renderChart()" :class="chartType === 'pie' ? 'bg-slate-700 text-emerald-400' : 'text-slate-400'" class="px-2.5 py-1 rounded transition">
              Macro Pie
            </button>
          </div>
        </div>

        <!-- Chart Container -->
        <div class="relative h-56 w-full flex items-center justify-center">
          <canvas id="macroChart"></canvas>
        </div>

        <!-- Macro Badges -->
        <div class="grid grid-cols-3 gap-2 pt-2 text-center text-xs">
          <div class="bg-slate-900/60 p-2 rounded-xl border border-slate-700">
            <span class="text-sky-400 block font-bold">Carbs</span>
            <span class="text-sm font-extrabold text-slate-200" x-text="`${totals.carbs}g / ${targets.carbs}g`"></span>
          </div>
          <div class="bg-slate-900/60 p-2 rounded-xl border border-slate-700">
            <span class="text-emerald-400 block font-bold">Protein</span>
            <span class="text-sm font-extrabold text-slate-200" x-text="`${totals.protein}g / ${targets.protein}g`"></span>
          </div>
          <div class="bg-slate-900/60 p-2 rounded-xl border border-slate-700">
            <span class="text-amber-400 block font-bold">Fats</span>
            <span class="text-sm font-extrabold text-slate-200" x-text="`${totals.fat}g / ${targets.fat}g`"></span>
          </div>
        </div>
      </section>

      <!-- Meals Breakdown -->
      <section class="space-y-4">
        <div class="flex items-center justify-between">
          <h3 class="font-bold text-slate-200 text-base">Today's Meals</h3>
          <button @click="addSnackTime()" class="text-xs bg-emerald-600/20 text-emerald-400 hover:bg-emerald-600/30 border border-emerald-500/30 font-semibold px-2.5 py-1 rounded-lg transition">
            + Add Snack Slot
          </button>
        </div>

        <!-- Meal Cards -->
        <template x-for="(meal, index) in meals" :key="index">
          <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 space-y-3">
            <div class="flex items-center justify-between border-b border-slate-700/60 pb-2">
              <div class="flex items-center gap-2">
                <span class="capitalize font-bold text-slate-200" x-text="meal.type"></span>
                <span x-show="meal.time" class="text-xs bg-slate-900 text-slate-400 px-2 py-0.5 rounded-full" x-text="meal.time"></span>
              </div>
              <span class="text-xs font-semibold text-slate-400" x-text="`${getMealCalories(meal)} kcal`"></span>
            </div>

            <!-- Meal Items -->
            <div class="space-y-2">
              <template x-for="(item, itemIndex) in meal.items" :key="itemIndex">
                <div class="flex items-center justify-between bg-slate-900/40 p-2 rounded-lg text-xs">
                  <div>
                    <span class="font-semibold text-slate-200" x-text="item.name"></span>
                    <span class="text-slate-500 text-[10px] block" x-text="item.quantity"></span>
                  </div>
                  <div class="flex items-center gap-3">
                    <span class="text-slate-400" x-text="`${item.calories}c | ${item.carbs}c / ${item.protein}p / ${item.fat}f`"></span>
                    <button @click="deleteItem(index, itemIndex)" class="text-rose-400 hover:text-rose-300 font-bold px-1">✕</button>
                  </div>
                </div>
              </template>
              <div x-show="meal.items.length === 0" class="text-slate-500 text-xs italic py-1">
                No entries logged yet.
              </div>
            </div>
          </div>
        </template>
      </section>
    </div>

    <!-- WEEKLY ANALYTICS TAB -->
    <div x-show="activeTab === 'weekly'" class="space-y-4">
      <div class="bg-slate-800 rounded-xl p-4 border border-slate-700 space-y-4">
        <h3 class="font-bold text-slate-200">Weekly Performance (Mon - Sun)</h3>
        <div class="grid grid-cols-2 gap-3 text-xs">
          <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
            <span class="text-slate-400 block">Avg Daily Calories</span>
            <span class="text-lg font-bold text-emerald-400" x-text="`${weeklyStats.avgCalories} kcal`"></span>
          </div>
          <div class="bg-slate-900 p-3 rounded-lg border border-slate-700">
            <span class="text-slate-400 block">Avg Daily Carbs</span>
            <span class="text-lg font-bold text-sky-400" x-text="`${weeklyStats.avgCarbs}g`"></span>
          </div>
        </div>

        <div>
          <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Most Eaten Foods</h4>
          <div class="space-y-1.5 text-xs">
            <template x-for="food in weeklyStats.topFoods" :key="food.name">
              <div class="flex justify-between bg-slate-900 p-2 rounded border border-slate-700/50">
                <span class="text-slate-200 font-medium" x-text="food.name"></span>
                <span class="text-emerald-400 font-semibold" x-text="`${food.count}x eaten`"></span>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- HIDDEN JSON IMPORT/EXPORT DRAWER MODAL -->
  <div x-show="showJsonDrawer" x-cloak class="fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4 backdrop-blur-sm">
    <div @click.away="showJsonDrawer = false" class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-lg p-5 space-y-4 shadow-2xl">
      <div class="flex items-center justify-between border-b border-slate-700 pb-3">
        <h3 class="font-bold text-slate-100">AI Assistant JSON Field</h3>
        <button @click="showJsonDrawer = false" class="text-slate-400 hover:text-slate-200 font-bold">✕</button>
      </div>

      <p class="text-xs text-slate-400">
        Paste the structured JSON response generated by the AI assistant below to automatically import your meal entry.
      </p>

      <textarea x-model="jsonInput" placeholder="Paste JSON here..." class="w-full h-44 bg-slate-900 text-slate-200 border border-slate-700 rounded-xl p-3 text-xs font-mono focus:ring-2 focus:ring-emerald-500 focus:outline-none"></textarea>

      <div class="flex gap-2">
        <button @click="importJson()" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-semibold text-xs py-2.5 rounded-xl transition">
          Import Payload
        </button>
        <button @click="exportTodayJson()" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold text-xs px-4 py-2.5 rounded-xl transition">
          Copy Today's Raw JSON
        </button>
      </div>
    </div>
  </div>

  <script>
    function macroApp() {
      return {
        activeTab: 'daily',
        chartType: 'bars', // 'bars' or 'pie'
        showJsonDrawer: false,
        jsonInput: '',
        chartInstance: null,

        targets: { calories: 2000, carbs: 150, protein: 130, fat: 80 },

        meals: [
          { type: 'breakfast', time: '08:30', items: [] },
          { type: 'lunch', time: '13:00', items: [] },
          { type: 'dinner', time: '19:30', items: [] },
          { type: 'snack', time: '16:00', items: [] }
        ],

        weeklyStats: {
          avgCalories: 1850,
          avgCarbs: 110,
          topFoods: [
            { name: 'Large Eggs', count: 12 },
            { name: 'Avocado', count: 6 },
            { name: 'Chicken Breast', count: 5 }
          ]
        },

        initApp() {
          const saved = localStorage.getItem('macro_meals');
          if (saved) {
            try { this.meals = JSON.parse(saved); } catch(e){}
          }
          this.$nextTick(() => this.renderChart());
        },

        saveData() {
          localStorage.setItem('macro_meals', JSON.stringify(this.meals));
          this.renderChart();
        },

        get totals() {
          let c = 0, carbs = 0, p = 0, f = 0;
          this.meals.forEach(m => {
            m.items.forEach(i => {
              c += Number(i.calories || 0);
              carbs += Number(i.carbs || 0);
              p += Number(i.protein || 0);
              f += Number(i.fat || 0);
            });
          });
          return { calories: Math.round(c), carbs: Math.round(carbs), protein: Math.round(p), fat: Math.round(f) };
        },

        getMealCalories(meal) {
          return meal.items.reduce((acc, i) => acc + Number(i.calories || 0), 0);
        },

        addSnackTime() {
          const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          this.meals.push({ type: 'snack', time, items: [] });
          this.saveData();
        },

        deleteItem(mealIndex, itemIndex) {
          this.meals[mealIndex].items.splice(itemIndex, 1);
          this.saveData();
        },

        importJson() {
          try {
            const data = JSON.parse(this.jsonInput);
            if (!data.meal || !Array.isArray(data.items)) {
              alert('Invalid payload format.');
              return;
            }

            let targetMeal = this.meals.find(m => m.type.toLowerCase() === data.meal.toLowerCase());
            if (!targetMeal || data.meal.toLowerCase() === 'snack') {
              targetMeal = { type: data.meal, time: data.time || '', items: [] };
              this.meals.push(targetMeal);
            }

            targetMeal.items.push(...data.items);
            this.saveData();
            this.jsonInput = '';
            this.showJsonDrawer = false;
          } catch(e) {
            alert('JSON Parse Error. Make sure you copied the exact code block.');
          }
        },

        exportTodayJson() {
          navigator.clipboard.writeText(JSON.stringify(this.meals, null, 2));
          alert('Copied today\'s complete meal payload to clipboard!');
        },

        renderChart() {
          const ctx = document.getElementById('macroChart')?.getContext('2d');
          if (!ctx) return;

          if (this.chartInstance) this.chartInstance.destroy();

          if (this.chartType === 'bars') {
            this.chartInstance = new Chart(ctx, {
              type: 'bar',
              data: {
                labels: ['Calories (x10)', 'Carbs (g)', 'Protein (g)', 'Fat (g)'],
                datasets: [
                  { label: 'Intake', data: [this.totals.calories / 10, this.totals.carbs, this.totals.protein, this.totals.fat], backgroundColor: '#10b981' },
                  { label: 'Target', data: [this.targets.calories / 10, this.targets.carbs, this.targets.protein, this.targets.fat], backgroundColor: '#334155' }
                ]
              },
              options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
            });
          } else {
            this.chartInstance = new Chart(ctx, {
              type: 'pie',
              data: {
                labels: ['Carbs', 'Protein', 'Fat'],
                datasets: [{
                  data: [this.totals.carbs, this.totals.protein, this.totals.fat],
                  backgroundColor: ['#38bdf8', '#10b981', '#fbbf24']
                }]
              },
              options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } } }
            });
          }
        }
      }
    }
  </script>
</body>
</html>
